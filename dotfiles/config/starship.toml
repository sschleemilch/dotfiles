format = """
$directory\
[оӮј](fg:foam bg:rose)\
$git_branch\
$git_state\
$git_status\
[оӮј](fg:rose bg:iris)\
$direnv\
[оӮј](fg:iris bg:gold)\
$nodejs\
$golang\
$rust\
$python\
[оӮј](fg:gold bg:subtle)\
$jobs\
[оӮј](fg:subtle bg:love)\
$status\
[оӮј](fg:love bg:base)\
$line_break\
$character\
"""
palette = "rose_pine"

[directory]
format = "[ пҗ“ $path ](bg:foam fg:overlay)"

[direnv]
disabled = false
format = "[ в–ј ](bg:iris fg:overlay)"

[git_branch]
format = "[ п„Ұ $branch ](bg:rose fg:overlay)"

[git_state]
style = "bg:rose fg:overlay"
format = '[\($state( $progress_current/$progress_total)\) ]($style)'

[git_status]
conflicted = "уұҗӢ"
deleted = "о«ҹ "
behind = "оӘҡ"
ahead = "оӘЎ"
diverged = "оӘЎоӘҡ"
format = "[$ahead_behind$all_status ](bg:rose fg:overlay)"
modified = "п‘ҷ "
renamed = "п‘ҡ "
staged = "уұҠҪ"
stashed = "пғҮ "
untracked = "уұҷҖ"

[jobs]
format = "[ $symbol$number ](bg:subtle fg:overlay)"
number_threshold = 1
symbol = "оҳ• "


# Languages
[python]
format = "[ $symbol$pyenv_prefix($version )(($virtualenv)) ](bg:gold fg:overlay)"
symbol = "оңј "

[rust]
format = "[ $symbol($version) ](bg:gold fg:overlay)"
symbol = "оһЁ "

[golang]
format = "[ $symbol($version)](bg:gold fg:overlay)"
symbol = "оҳ§ "

[nodejs]
format = "[ $symbol($version) ](bg:gold fg:overlay)"
symbol = "у°Һҷ "

[palettes.rose_pine]
base= "#232136"
surface= "#2a273f"
overlay= "#393552"
muted= "#6e6a86"
subtle= "#908caa"
text= "#e0def4"
love= "#eb6f92"
gold= "#f6c177"
rose= "#ea9a97"
pine= "#3e8fb0"
foam= "#9ccfd8"
iris= "#c4a7e7"

[status]
disabled = false
format = "[ п’ү $status](bg:love fg:overlay)"
