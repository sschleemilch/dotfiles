format = """
$directory\
[Óāľ](fg:foam bg:rose)\
$git_branch\
$git_state\
$git_status\
[Óāľ](fg:rose bg:iris)\
$direnv\
[Óāľ](fg:iris bg:gold)\
$nodejs\
$golang\
$rust\
$python\
[Óāľ](fg:gold bg:subtle)\
$jobs\
[Óāľ](fg:subtle bg:love)\
$status\
[Óāľ](fg:love bg:base)\
$line_break\
$character\
"""
palette = "rose_pine"

[directory]
format = "[ Ôźď $path ](bg:foam fg:overlay)"

[direnv]
disabled = false
format = "[ ‚Ėľ ](bg:iris fg:overlay)"

[git_branch]
format = "[ ÔĄ¶ $branch ](bg:rose fg:overlay)"

[git_state]
style = "bg:rose fg:overlay"
format = '[\($state( $progress_current/$progress_total)\) ]($style)'

[git_status]
conflicted = "ůįČĀ"
deleted = "Óęü "
behind = "ůįĀÖ"
ahead = "ůįĀĚ"
diverged = "ÔĀĹ "
format = "[$ahead_behind$all_status ](bg:rose fg:overlay)"
modified = "ÔĎô "
renamed = "ÔĎö "
staged = "ůĪäĹ"
stashed = "ÔÉá "
untracked = "ůĪôÄ"

[jobs]
format = "[ $symbol$number ](bg:subtle fg:overlay)"
number_threshold = 1
symbol = "Óėē "


# Languages
[python]
format = "[ $symbol$pyenv_prefix($version )(($virtualenv)) ](bg:gold fg:overlay)"
symbol = "Óúľ "

[rust]
format = "[ $symbol($version) ](bg:gold fg:overlay)"
symbol = "Óě® "

[golang]
format = "[ $symbol($version)](bg:gold fg:overlay)"
symbol = "Óėß "

[nodejs]
format = "[ $symbol($version) ](bg:gold fg:overlay)"
symbol = "ůįéô "

[palettes.rose_pine]
base= "#232136"
surface= "#2a273f"
overlay= "#393552"
muted= "#6e6a86"
subtle= "#908caa"
text= "#e0def4"
love= "#eb6f92"
gold= "#f6c177"
rose= "#ea9a97"
pine= "#3e8fb0"
foam= "#9ccfd8"
iris= "#c4a7e7"

[status]
disabled = false
format = "[ ÔíČ $status](bg:love fg:overlay)"
