format = """
[в”Ңв”Җ](fg:subtle bg:base)\
[оӮ¶](fg:foam bg:base)\
$directory\
[оӮҙ](fg:foam bg:rose)\
$git_branch\
$git_state\
$git_status\
[оӮҙ](fg:rose bg:iris)\
$direnv\
[оӮҙ](fg:iris bg:gold)\
$nodejs\
$golang\
$rust\
$python\
[оӮҙ](fg:gold bg:subtle)\
$jobs\
[оӮҙ](fg:subtle bg:base)\
$line_break\
[в””в”Җ](fg:subtle bg:base)\
$status\
$character\
"""
palette = "rose_pine"

[directory]
format = "[ пҗ“ $path ](bg:foam fg:overlay)"

[character]
success_symbol = "[вқҜ](fg:subtle)"
error_symbol = "[вқҜ](fg:love)"
vimcmd_symbol = "[вқҜ](fg:gold)"
vimcmd_replace_one_symbol = "[вқҜ](fg:gold)"
vimcmd_replace_symbol = "[вқҜ](fg:gold)"
vimcmd_visual_symbol = "[вқҜ](fg:gold)"

[direnv]
disabled = false
format = "[ в–ј ](bg:iris fg:overlay)"

[git_branch]
format = "[ п„Ұ $branch ](bg:rose fg:overlay)"

[git_state]
style = "bg:rose fg:overlay"
format = '[\($state( $progress_current/$progress_total)\) ]($style)'

[git_status]
conflicted = "у°үҒ"
deleted = "о«ҹ "
behind = "у°Ғ…"
ahead = "у°Ғқ"
diverged = "пҒҪ "
format = "[$ahead_behind$all_status ](bg:rose fg:overlay)"
modified = "п‘ҷ "
renamed = "п‘ҡ "
staged = "уұҠҪ"
stashed = "пғҮ "
untracked = "уұҷҖ"

[jobs]
format = "[ $symbol$number ](bg:subtle fg:overlay)"
number_threshold = 1
symbol = "оҳ• "


# Languages
[python]
format = "[ $symbol$pyenv_prefix($version )(($virtualenv)) ](bg:gold fg:overlay)"
symbol = "оңј "

[rust]
format = "[ $symbol($version) ](bg:gold fg:overlay)"
symbol = "оһЁ "

[golang]
format = "[ $symbol($version) ](bg:gold fg:overlay)"
symbol = "оҳ§ "

[nodejs]
format = "[ $symbol($version) ](bg:gold fg:overlay)"
symbol = "у°Һҷ "

[palettes.rose_pine]
base= "#232136"
surface= "#2a273f"
overlay= "#393552"
muted= "#6e6a86"
subtle= "#908caa"
text= "#e0def4"
love= "#eb6f92"
gold= "#f6c177"
rose= "#ea9a97"
pine= "#3e8fb0"
foam= "#9ccfd8"
iris= "#c4a7e7"

[status]
disabled = false
format = "[оӮ¶](bg:base fg:love)[ п’ү $status ](bg:love fg:overlay)[оӮҙ](bg:base fg:love)"
